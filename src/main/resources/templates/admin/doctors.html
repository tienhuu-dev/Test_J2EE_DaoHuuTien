<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Bác sĩ - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Clinic Admin</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/admin/doctors">Quản lý Bác sĩ</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách Bác sĩ</h2>
        <a th:href="@{/admin/doctors/new}" class="btn btn-primary">Thêm Bác sĩ mới</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark text-center">
            <tr>
                <th>ID</th>
                <th>Hình ảnh</th>
                <th>Tên Bác sĩ</th>
                <th>Chuyên khoa</th>
                <th>Khoa</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="doctor : ${doctors}">
                <td class="text-center" th:text="${doctor.id}">1</td>
                <td class="text-center">
                    <img th:src="${doctor.image}" alt="doctor" style="width: 50px; height: 50px; object-fit: cover;">
                </td>
                <td th:text="${doctor.name}">Tên</td>
                <td th:text="${doctor.specialty}">Chuyên khoa</td>
                <td th:text="${doctor.department.name}">Khoa</td>
                <td class="text-center">
                    <a th:href="@{/admin/doctors/edit/{id}(id=${doctor.id})}" class="btn btn-warning btn-sm">Sửa</a>
                    <a th:href="@{/admin/doctors/delete/{id}(id=${doctor.id})}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc chắn muốn xóa bác sĩ này?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
    
    <div th:if="${#lists.isEmpty(doctors)}" class="alert alert-info text-center">
        Chưa có bác sĩ nào trong hệ thống.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
