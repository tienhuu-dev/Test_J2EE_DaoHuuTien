<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${doctor.id == null ? 'Thêm Bác sĩ' : 'Sửa Bác sĩ'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Clinic Admin</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/admin/doctors">Quản lý Bác sĩ</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0 text-center" th:text="${doctor.id == null ? 'Thêm Bác sĩ mới' : 'Chỉnh sửa Bác sĩ'}">Form</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/doctors/save}" th:object="${doctor}" method="post">
                <!-- ID ẩn cho trường hợp Edit -->
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="name" class="form-label">Tên Bác sĩ</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label for="specialty" class="form-label">Chuyên khoa</label>
                    <input type="text" class="form-control" id="specialty" th:field="*{specialty}" required>
                </div>

                <div class="mb-3">
                    <label for="image" class="form-label">Link Hình ảnh (URL)</label>
                    <input type="text" class="form-control" id="image" th:field="*{image}">
                </div>

                <div class="mb-3">
                    <label for="department" class="form-label">Khoa</label>
                    <select class="form-select" id="department" th:name="department.id" required>
                        <option value="">-- Chọn Khoa --</option>
                        <option th:each="dept : ${departments}" 
                                th:value="${dept.id}" 
                                th:text="${dept.name}"
                                th:selected="${doctor.department != null && dept.id == doctor.department.id}">Khoa</option>
                    </select>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success" th:text="${doctor.id == null ? 'Thêm mới' : 'Cập nhật'}">Lưu</button>
                    <a href="/admin/doctors" class="btn btn-secondary">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
