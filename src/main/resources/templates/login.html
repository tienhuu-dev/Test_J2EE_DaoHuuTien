<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Clinic System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-success text-white text-center py-3">
                    <h3 class="mb-0">Đăng nhập</h3>
                </div>
                <div class="card-body p-4">
                    <!-- Thông báo thành công từ trang đăng ký -->
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                    
                    <!-- Thông báo lỗi đăng nhập (Spring Security sẽ trả về error này) -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Tên đăng nhập hoặc mật khẩu không đúng.
                    </div>
                    
                    <!-- Thông báo logout thành công -->
                    <div th:if="${param.logout}" class="alert alert-info">
                        Bạn đã đăng xuất thành công.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="Nhập username">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="Nhập mật khẩu">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                            <label class="form-check-label" for="remember-me">Ghi nhớ đăng nhập (7 ngày)</label>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success btn-lg">Đăng nhập</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center bg-white border-0 py-3">
                    Chưa có tài khoản? <a href="/register" class="text-success fw-bold text-decoration-none">Đăng ký ngay</a>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/" class="text-muted text-decoration-none small">← Quay lại trang chủ</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
