<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lịch khám - Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-info text-white text-center py-3">
                    <h3 class="mb-0">Đặt lịch khám bệnh</h3>
                </div>
                <div class="card-body p-4">
                    <!-- Thông báo lỗi -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div class="text-center mb-4">
                        <img th:src="${doctor.image}" class="rounded-circle mb-3" style="width: 100px; height: 100px; object-fit: cover;">
                        <h4 class="text-primary" th:text="${doctor.name}">Tên Bác sĩ</h4>
                        <p class="text-muted" th:text="${doctor.specialty} + ' - ' + ${doctor.department.name}">Chuyên khoa</p>
                    </div>

                    <form th:action="@{/enroll/save}" method="post">
                        <input type="hidden" name="doctorId" th:value="${doctor.id}">

                        <div class="mb-3">
                            <label for="appointmentDate" class="form-label">Chọn ngày và giờ khám</label>
                            <input type="datetime-local" class="form-control" id="appointmentDate" name="appointmentDate" required>
                            <div class="form-text">Ví dụ: 25/03/2026, 09:00 AM</div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-info text-white btn-lg">Xác nhận Đặt lịch</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center bg-white border-0 py-3">
                    <a href="/" class="text-muted text-decoration-none small">← Quay lại danh sách bác sĩ</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
