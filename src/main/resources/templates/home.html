<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clinic Appointment - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .doctor-card img {
            height: 250px;
            object-fit: cover;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">Clinic System</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4 text-center">Danh sách Bác sĩ</h2>
    
    <div class="row row-cols-1 row-cols-md-5 g-4">
        <div class="col" th:each="doctor : ${listDoctors}">
            <div class="card h-100 doctor-card shadow-sm">
                <img th:src="${doctor.image != null ? doctor.image : 'https://via.placeholder.com/200'}" 
                     class="card-img-top" th:alt="${doctor.name}">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${doctor.name}">Tên Bác sĩ</h5>
                    <p class="card-text mb-1"><strong>Chuyên khoa:</strong> <span th:text="${doctor.specialty}">Chuyên khoa</span></p>
                    <p class="card-text"><strong>Khoa:</strong> <span th:text="${doctor.department.name}">Khoa</span></p>
                </div>
                <div class="card-footer bg-white border-0 text-center pb-3">
                    <a th:href="@{/enroll/new/{id}(id=${doctor.id})}" class="btn btn-outline-primary btn-sm">Đặt lịch hẹn</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Phân trang -->
    <nav th:if="${totalPages > 1}" class="mt-5">
        <ul class="pagination justify-content-center">
            <!-- Nút Trước -->
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/(pageNo=${currentPage - 1})}" aria-label="Previous">
                    <span aria-hidden="true">Trước</span>
                </a>
            </li>
            
            <!-- Các số trang -->
            <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" 
                th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/(pageNo=${i})}" th:text="${i}">1</a>
            </li>
            
            <!-- Nút Tiếp -->
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/(pageNo=${currentPage + 1})}" aria-label="Next">
                    <span aria-hidden="true">Tiếp</span>
                </a>
            </li>
        </ul>
    </nav>
    <div th:if="${totalItems > 0}" class="text-center text-muted mt-2">
        Tổng cộng: [[${totalItems}]] bác sĩ
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
